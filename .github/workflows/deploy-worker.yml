name: Deploy paid Worker

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bountyverdict-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@v7
        with:
          node-version: 22.23.1
          cache: npm
          cache-dependency-path: agent/package-lock.json

      - run: npm ci --ignore-scripts

      - name: Verify required deployment secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PAY_TO_ADDRESS: ${{ secrets.PAY_TO_ADDRESS }}
          CDP_API_KEY_ID: ${{ secrets.CDP_API_KEY_ID }}
          CDP_API_KEY_SECRET: ${{ secrets.CDP_API_KEY_SECRET }}
          UPSTREAM_GITHUB_TOKEN: ${{ secrets.UPSTREAM_GITHUB_TOKEN }}
          CANARY_TOKEN: ${{ secrets.CANARY_TOKEN }}
          THE402_API_KEY: ${{ secrets.THE402_API_KEY }}
          THE402_WEBHOOK_SECRET: ${{ secrets.THE402_WEBHOOK_SECRET }}
        run: |
          node -e '
            const required = ["CLOUDFLARE_API_TOKEN", "PAY_TO_ADDRESS", "CDP_API_KEY_ID", "CDP_API_KEY_SECRET", "UPSTREAM_GITHUB_TOKEN", "CANARY_TOKEN", "THE402_API_KEY", "THE402_WEBHOOK_SECRET"];
            const missing = required.filter((name) => !process.env[name]);
            if (missing.length) throw new Error(`Missing GitHub Actions secrets: ${missing.join(", ")}`);
            if (!/^0x[a-fA-F0-9]{40}$/.test(process.env.PAY_TO_ADDRESS)) throw new Error("PAY_TO_ADDRESS is invalid.");
          '

      - name: Deploy production Worker with secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PAY_TO_ADDRESS: ${{ secrets.PAY_TO_ADDRESS }}
          CDP_API_KEY_ID: ${{ secrets.CDP_API_KEY_ID }}
          CDP_API_KEY_SECRET: ${{ secrets.CDP_API_KEY_SECRET }}
          UPSTREAM_GITHUB_TOKEN: ${{ secrets.UPSTREAM_GITHUB_TOKEN }}
          CANARY_TOKEN: ${{ secrets.CANARY_TOKEN }}
          THE402_API_KEY: ${{ secrets.THE402_API_KEY }}
          THE402_WEBHOOK_SECRET: ${{ secrets.THE402_WEBHOOK_SECRET }}
        run: |
          umask 077
          secret_file=/tmp/bountyverdict-worker-secrets.json
          deploy_log=/tmp/bountyverdict-worker-deploy.log
          trap 'rm -f "$secret_file" "$deploy_log"' EXIT
          node -e '
            const fs = require("node:fs");
            fs.writeFileSync(process.argv[1], JSON.stringify({
              PAY_TO_ADDRESS: process.env.PAY_TO_ADDRESS,
              CDP_API_KEY_ID: process.env.CDP_API_KEY_ID,
              CDP_API_KEY_SECRET: process.env.CDP_API_KEY_SECRET,
              GITHUB_TOKEN: process.env.UPSTREAM_GITHUB_TOKEN,
              CANARY_TOKEN: process.env.CANARY_TOKEN,
              THE402_API_KEY: process.env.THE402_API_KEY,
              THE402_WEBHOOK_SECRET: process.env.THE402_WEBHOOK_SECRET,
            }));
          ' "$secret_file"
          npx wrangler deploy --env production --secrets-file "$secret_file" 2>&1 | tee "$deploy_log"
          api_url=$(grep -Eo 'https://[^[:space:]]+\.workers\.dev' "$deploy_log" | tail -1)
          node -e '
            const expected = "https://bountyverdict-agent-production.mimirslab.workers.dev";
            const value = new URL(process.argv[1]);
            if (value.origin !== expected || value.pathname !== "/") throw new Error("Deployment did not resolve to the exact production Worker origin.");
            console.log(`PRODUCTION_API_URL=${value.origin}`);
          ' "$api_url" >> "$GITHUB_ENV"

      - name: Verify live free and paid contracts
        run: |
          owner_curl() {
            command curl --user-agent "bountyverdict-owner-audit/1.0" "$@"
          }
          owner_curl --fail --silent --show-error "$PRODUCTION_API_URL/" | node -e '
            let body = ""; process.stdin.on("data", (chunk) => body += chunk); process.stdin.on("end", () => {
              const value = JSON.parse(body);
              const expected = [
                ["BountyVerdict", "$0.05", "/api/verdict", "GET"],
                ["BountyVerdict Portfolio", "$0.40", "/api/portfolio", "POST"],
                ["HarnessVerdict", "$0.03", "/api/harness", "GET"],
                ["SkillVerdict", "$0.06", "/api/skill", "GET"],
                ["RunVerdict", "$0.04", "/api/run", "GET"],
                ["FlakeVerdict", "$0.07", "/api/flake", "GET"],
                ["MCPDriftVerdict", "$0.02", "/api/mcp-drift", "POST"],
              ];
              const actual = value.products?.map(({ name, price, endpoint, method }) => [name, price, endpoint, method]);
              if (value.status !== "available" || JSON.stringify(actual) !== JSON.stringify(expected)) process.exit(1);
              if (value.agent_manifest !== "https://cristianmoroaica.github.io/bountyverdict/agent-manifest.json" || value.agent_skill !== "https://cristianmoroaica.github.io/bountyverdict/skills/route-github-agent-checks/SKILL.md") process.exit(1);
              if (value.distributed_agent_manifest !== "/agent-manifest.json" || value.distributed_agent_skill !== "/SKILL.md") process.exit(1);
              if (value.ai_catalog !== "/.well-known/ai-catalog.json") process.exit(1);
            });
          '
          owner_curl --fail --silent --show-error "$PRODUCTION_API_URL/api/sample" >/dev/null
          owner_curl --fail --silent --show-error "$PRODUCTION_API_URL/api/portfolio/sample" >/dev/null
          owner_curl --fail --silent --show-error "$PRODUCTION_API_URL/api/harness/sample" >/dev/null
          owner_curl --fail --silent --show-error "$PRODUCTION_API_URL/api/skill/sample" >/dev/null
          owner_curl --fail --silent --show-error "$PRODUCTION_API_URL/api/run/sample" >/dev/null
          owner_curl --fail --silent --show-error "$PRODUCTION_API_URL/api/flake/sample" | node -e '
            let body = ""; process.stdin.on("data", (chunk) => body += chunk); process.stdin.on("end", () => {
              const value = JSON.parse(body);
              const verdicts = ["CONFIRMED_FLAKE", "LIKELY_FLAKE", "RECURRING_FAILURE", "NEW_FAILURE", "INCONCLUSIVE", "NOT_FAILED"];
              if (value.product !== "FlakeVerdict" || value.version !== "1.0" || !verdicts.includes(value.verdict)) process.exit(1);
            });
          '
          owner_curl --fail --silent --show-error "$PRODUCTION_API_URL/api/mcp-drift/sample" | node -e '
            let body = ""; process.stdin.on("data", (chunk) => body += chunk); process.stdin.on("end", () => {
              const value = JSON.parse(body);
              if (value.service !== "MCPDriftVerdict" || value.contract_version !== "mcp-drift/1" || value.verdict !== "SAFE_ADDITIVE" || value.coverage?.truncated !== false) process.exit(1);
            });
          '
          # A newly added route can briefly resolve to the previous Worker at a
          # different edge after deploy. Retry only this additive route before
          # declaring the release unhealthy.
          owner_curl --fail --silent --show-error --retry 10 --retry-delay 1 --retry-all-errors "$PRODUCTION_API_URL/.well-known/x402" | node -e '
            let body = ""; process.stdin.on("data", (chunk) => body += chunk); process.stdin.on("end", () => {
              const value = JSON.parse(body);
              const expected = ["/api/verdict", "/api/portfolio", "/api/harness", "/api/skill", "/api/run", "/api/flake", "/api/mcp-drift"]
                .map((path) => `${process.env.PRODUCTION_API_URL}${path}`);
              if (value.spec !== "agent402-service-manifest/1" || value.version !== 1) process.exit(1);
              if (JSON.stringify(value.resources) !== JSON.stringify(expected)) process.exit(1);
              if (value.payment?.x402?.primaryNetwork !== "eip155:8453" || !/^0x[a-fA-F0-9]{40}$/.test(value.payment?.x402?.payTo || "")) process.exit(1);
              if (value.discovery?.agentManifest !== "https://cristianmoroaica.github.io/bountyverdict/agent-manifest.json") process.exit(1);
              if (value.discovery?.agentSkill !== "https://cristianmoroaica.github.io/bountyverdict/skills/route-github-agent-checks/SKILL.md") process.exit(1);
              if (value.discovery?.aiCatalog !== `${process.env.PRODUCTION_API_URL}/.well-known/ai-catalog.json`) process.exit(1);
            });
          '
          owner_curl --fail --silent --show-error --retry 10 --retry-delay 1 --retry-all-errors "$PRODUCTION_API_URL/.well-known/mcp.json" | node -e '
            let body = ""; process.stdin.on("data", (chunk) => body += chunk); process.stdin.on("end", () => {
              const value = JSON.parse(body);
              if (value.name !== "io.github.cristianmoroaica/bountyverdict" || value.url !== `${process.env.PRODUCTION_API_URL}/mcp`) process.exit(1);
              if (value.transport !== "streamable-http" || value.protocol_version !== "2025-11-25") process.exit(1);
              if (value.payment?.protocol !== "x402" || value.payment?.network !== "eip155:8453" || value.payment?.currency !== "USDC") process.exit(1);
              if (value.ai_catalog !== `${process.env.PRODUCTION_API_URL}/.well-known/ai-catalog.json`) process.exit(1);
            });
          '
          owner_curl --fail --silent --show-error --retry 10 --retry-delay 1 --retry-all-errors "$PRODUCTION_API_URL/.well-known/ai-catalog.json" | node -e '
            let body = ""; process.stdin.on("data", (chunk) => body += chunk); process.stdin.on("end", () => {
              const value = JSON.parse(body);
              const entry = value.entries?.[0];
              const tools = ["check_github_bounty", "rank_github_bounties", "audit_agent_harness", "diagnose_github_actions_run", "classify_github_actions_flake", "check_mcp_tool_drift"];
              if (value.specVersion !== "1.0" || value.entries?.length !== 1) process.exit(1);
              if (entry?.identifier !== "urn:air:bountyverdict-agent-production.mimirslab.workers.dev:server:bountyverdict") process.exit(1);
              if (entry?.type !== "application/mcp-server-card+json" || entry?.url !== `${process.env.PRODUCTION_API_URL}/.well-known/mcp.json`) process.exit(1);
              if (entry?.representativeQueries?.length !== 5 || entry.representativeQueries.some((query) => query !== query.toLowerCase() || /bountyverdict/i.test(query))) process.exit(1);
              if (JSON.stringify(entry?.capabilities) !== JSON.stringify(tools)) process.exit(1);
              if (entry?.metadata?.paymentProtocol !== "x402-v2" || entry?.metadata?.paymentNetwork !== "eip155:8453" || entry?.metadata?.paymentCurrency !== "USDC" || entry?.metadata?.mutatesExternalSystems !== false) process.exit(1);
            });
          '
          owner_curl --fail --silent --show-error --retry 10 --retry-delay 1 --retry-all-errors "$PRODUCTION_API_URL/agent-manifest.json" | node -e '
            let body = ""; process.stdin.on("data", (chunk) => body += chunk); process.stdin.on("end", () => {
              const value = JSON.parse(body);
              const expected = ["single", "portfolio", "harness", "run", "flake", "mcpdrift"];
              if (value.spec !== "bountyverdict-agent-manifest/1" || value.version !== 1) process.exit(1);
              if (value.origin !== process.env.PRODUCTION_API_URL || JSON.stringify(value.products?.map(({ id }) => id)) !== JSON.stringify(expected)) process.exit(1);
              if (value.products?.some(({ id }) => id === "skill") || JSON.stringify(value.distribution_scope?.excluded_products) !== JSON.stringify(["SkillVerdict"])) process.exit(1);
              if (value.payment?.network !== "eip155:8453" || !/^0x[a-fA-F0-9]{40}$/.test(value.payment?.pay_to || "")) process.exit(1);
            });
          '
          owner_curl --fail --silent --show-error --retry 10 --retry-delay 1 --retry-all-errors "$PRODUCTION_API_URL/SKILL.md" | node -e '
            let body = ""; process.stdin.on("data", (chunk) => body += chunk); process.stdin.on("end", () => {
              if (!body.startsWith("---\nname: bountyverdict-agent-decisions\n") || !body.includes("### HarnessVerdict") || !body.includes("### MCPDriftVerdict") || body.includes("### SkillVerdict")) process.exit(1);
              if (!body.includes(`${process.env.PRODUCTION_API_URL}/agent-manifest.json`) || !body.includes("network `eip155:8453` (Base mainnet)")) process.exit(1);
            });
          '
          node <<'NODE'
          const api = process.env.PRODUCTION_API_URL;
          const headers = {
            Accept: "application/json, text/event-stream",
            "Content-Type": "application/json",
            "MCP-Protocol-Version": "2025-11-25",
            "User-Agent": "bountyverdict-owner-audit/1.0",
          };
          async function rpc(id, method, params = {}) {
            const response = await fetch(`${api}/mcp`, {
              method: "POST",
              headers,
              body: JSON.stringify({ jsonrpc: "2.0", id, method, params }),
            });
            if (!response.ok) throw new Error(`MCP ${method} returned ${response.status}`);
            return response.json();
          }
          const initialized = await rpc(1, "initialize", {
            protocolVersion: "2025-11-25",
            capabilities: {},
            clientInfo: { name: "bountyverdict-release-check", version: "1.0.0" },
          });
          if (initialized.result?.protocolVersion !== "2025-11-25" || initialized.result?.serverInfo?.name !== "BountyVerdict") process.exit(1);
          const listed = await rpc(2, "tools/list");
          const expectedNames = ["check_github_bounty", "rank_github_bounties", "audit_agent_harness", "diagnose_github_actions_run", "classify_github_actions_flake", "check_mcp_tool_drift"];
          if (JSON.stringify(listed.result?.tools?.map(({ name }) => name)) !== JSON.stringify(expectedNames)) process.exit(1);
          const outputSchemaSizes = listed.result.tools.map(({ outputSchema }) => Buffer.byteLength(JSON.stringify(outputSchema)));
          if (listed.result.tools.some(({ outputSchema }) => outputSchema?.type !== "object" || !Array.isArray(outputSchema.required))) process.exit(1);
          if (outputSchemaSizes.some((bytes) => bytes > 2048) || outputSchemaSizes.reduce((total, bytes) => total + bytes, 0) > 12000) process.exit(1);
          const compatibilityHeaders = { ...headers, "MCP-Protocol-Version": "2025-06-18" };
          async function compatibilityRpc(id, method, params = {}) {
            const response = await fetch(`${api}/mcp`, {
              method: "POST",
              headers: compatibilityHeaders,
              body: JSON.stringify({ jsonrpc: "2.0", id, method, params }),
            });
            if (!response.ok) throw new Error(`MCP compatibility ${method} returned ${response.status}`);
            return response.json();
          }
          const compatibilityInitialized = await compatibilityRpc(20, "initialize", {
            protocolVersion: "2025-06-18",
            capabilities: {},
            clientInfo: { name: "bountyverdict-release-check", version: "1.0.0" },
          });
          if (compatibilityInitialized.result?.protocolVersion !== "2025-06-18") process.exit(1);
          const compatibilityListed = await compatibilityRpc(21, "tools/list");
          if (JSON.stringify(compatibilityListed.result?.tools?.map(({ name }) => name)) !== JSON.stringify(expectedNames)) process.exit(1);
          const calls = [
            ["check_github_bounty", { issue_url: "https://github.com/owner/repo/issues/1" }, "50000", "/api/verdict", "GET"],
            ["rank_github_bounties", { issue_urls: ["https://github.com/owner/repo/issues/1", "https://github.com/owner/repo/issues/2"] }, "400000", "/api/portfolio", "POST"],
            ["audit_agent_harness", { repo_url: "https://github.com/owner/repo" }, "30000", "/api/harness", "GET"],
            ["diagnose_github_actions_run", { run_url: "https://github.com/owner/repo/actions/runs/1" }, "40000", "/api/run", "GET"],
            ["classify_github_actions_flake", { run_url: "https://github.com/owner/repo/actions/runs/1", attempt: 1 }, "70000", "/api/flake", "GET"],
            ["check_mcp_tool_drift", { contract_version: "mcp-drift/1", subject: { server_id: "release-check" }, annotation_source_trust: "trusted", baseline: { protocol_version: "2025-11-25", complete: true, tools: [] }, current: { protocol_version: "2025-11-25", complete: true, tools: [] } }, "20000", "/api/mcp-drift", "POST"],
          ];
          const handoffKey = "io.github.cristianmoroaica/bountyverdict/http-payment-handoff";
          for (const [name, args, amount, path, method] of calls) {
            const called = await rpc(3, "tools/call", { name, arguments: args });
            const challenge = JSON.parse(called.result?.content?.[0]?.text || "null");
            if (!called.result?.isError || called.result?.structuredContent !== undefined) process.exit(1);
            if (challenge?.accepts?.[0]?.amount !== amount || challenge?.accepts?.[0]?.network !== "eip155:8453") process.exit(1);
            if (challenge?.resource?.url !== `mcp://tool/${name}` || challenge?.extensions?.bazaar?.info?.input?.toolName !== name) process.exit(1);
            const handoff = challenge?.extensions?.[handoffKey]?.info;
            const payment = handoff?.payment;
            if (handoff?.version !== "1" || handoff?.direct_mcp?.automatic_payment_requires !== "@x402/mcp") process.exit(1);
            if (handoff?.wallet_mcp?.capability !== "make_x402_request" || handoff?.wallet_mcp?.use_exact_request !== true) process.exit(1);
            if (payment?.max_amount_atomic !== amount || payment?.exact_request?.method !== method) process.exit(1);
            if (new URL(payment?.exact_request?.url || "invalid").pathname !== path) process.exit(1);
            if (payment?.agentic_wallet?.executable !== "npx" || payment?.agentic_wallet?.execute_as_argument_vector !== true || payment?.agentic_wallet?.do_not_join_into_shell_string !== true) process.exit(1);
            const argv = payment?.agentic_wallet?.argv;
            if (!Array.isArray(argv) || JSON.stringify(argv.slice(0, 3)) !== JSON.stringify(["awal@2.12.0", "x402", "pay"])) process.exit(1);
            if (JSON.stringify(argv.slice(-3)) !== JSON.stringify(["--max-amount", amount, "--json"])) process.exit(1);
            if (method === "POST") {
              if (JSON.stringify(payment.exact_request.body) !== JSON.stringify(args) || !/^sha256:[a-f0-9]{64}$/.test(payment.exact_request.normalized_body_sha256 || "")) process.exit(1);
              if (payment.authorization_scope !== "resource_url_not_post_body") process.exit(1);
            } else if (payment.exact_request.body !== undefined || payment.exact_request.normalized_body_sha256 !== undefined || payment.authorization_scope !== "resource_url") process.exit(1);
          }
          NODE
          owner_curl --fail --silent --show-error "$PRODUCTION_API_URL/openapi.json" | node -e '
            let body = ""; process.stdin.on("data", (chunk) => body += chunk); process.stdin.on("end", () => {
              const spec = JSON.parse(body);
              const paid = spec.paths?.["/api/flake"]?.get;
              const sample = spec.paths?.["/api/flake/sample"]?.get;
              if (!sample || paid?.["x-x402"]?.price !== "$0.07" || paid?.["x-x402"]?.network !== "eip155:8453") process.exit(1);
              if (JSON.stringify(paid.parameters?.map(({ name }) => name)) !== JSON.stringify(["run_url", "attempt"])) process.exit(1);
              const mcp = spec.paths?.["/api/mcp-drift"]?.post;
              const mcpSample = spec.paths?.["/api/mcp-drift/sample"]?.get;
              if (!mcpSample || mcp?.["x-x402"]?.price !== "$0.02" || mcp?.["x-x402"]?.network !== "eip155:8453") process.exit(1);
              if (mcp.requestBody?.content?.["application/json"]?.schema?.additionalProperties !== false) process.exit(1);
            });
          '
          for product in single portfolio harness skill run flake mcpdrift; do
            PRODUCT="$product" \
              RESOURCE_SERVER_URL="$PRODUCTION_API_URL" \
              EXPECTED_NETWORK="eip155:8453" \
              EXPECTED_ASSET="0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913" \
              npm run payment:inspect
          done

      - name: Verify real production handlers
        env:
          CANARY_TOKEN: ${{ secrets.CANARY_TOKEN }}
        run: |
          umask 077
          canary_state=/tmp/bountyverdict-functional-canary.json
          trap 'rm -f "$canary_state"' EXIT
          CANARY_PRODUCT=all CANARY_STATE_FILE="$canary_state" npm run canary:production
          node -e '
            const state = require(process.argv[1]);
            const expected = ["single", "portfolio", "harness", "skill", "run", "flake", "mcpdrift"];
            if (state.healthy !== true || JSON.stringify(state.products_checked) !== JSON.stringify(expected)) process.exit(1);
            if (!state.checks?.some(({ product, ok }) => product === "flake" && ok === true)) process.exit(1);
            if (!state.checks?.some(({ product, ok }) => product === "mcpdrift" && ok === true)) process.exit(1);
          ' "$canary_state"

      - name: Activate public agent manifest
        run: npm run manifest:activate

      - uses: actions/upload-artifact@v4
        with:
          name: activated-agent-manifest
          path: agent-manifest.json
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v4
        with:
          name: activated-agent-manifest
          path: /tmp/bountyverdict-activation

      - name: Publish activation record
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp /tmp/bountyverdict-activation/agent-manifest.json agent-manifest.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agent-manifest.json
          if ! git diff --cached --quiet; then
            git commit -m "Activate BountyVerdict production manifest"
            auth=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)
            git -c http.https://github.com/.extraheader="AUTHORIZATION: basic $auth" push origin HEAD:main
          fi
