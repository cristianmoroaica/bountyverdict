name: Publish remote MCP server

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: bountyverdict-mcp-registry
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Read immutable manifest coordinates
        id: manifest
        run: |
          name=$(jq -er '.name' server.json)
          version=$(jq -er '.version' server.json)
          remote=$(jq -er '[.remotes[] | select(.type == "streamable-http") | .url] | if length == 1 then .[0] else error("expected exactly one Streamable HTTP remote") end' server.json)
          [[ "$name" == io.github.cristianmoroaica/* ]]
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$remote" == "https://bountyverdict-agent-production.mimirslab.workers.dev/mcp" ]]
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "remote=$remote" >> "$GITHUB_OUTPUT"

      - name: Verify live MCP endpoint
        env:
          SERVER_VERSION: ${{ steps.manifest.outputs.version }}
          SERVER_REMOTE: ${{ steps.manifest.outputs.remote }}
        run: |
          payload=$(jq -cn --arg version "$SERVER_VERSION" '{jsonrpc:"2.0",id:1,method:"initialize",params:{protocolVersion:"2025-11-25",capabilities:{},clientInfo:{name:"registry-release-check",version:$version}}}')
          response=$(curl --fail --silent --show-error \
            --user-agent "bountyverdict-owner-audit/1.0" \
            --header "Accept: application/json, text/event-stream" \
            --header "Content-Type: application/json" \
            --header "MCP-Protocol-Version: 2025-11-25" \
            --data "$payload" \
            "$SERVER_REMOTE")
          jq -e --arg version "$SERVER_VERSION" '.result.protocolVersion == "2025-11-25" and .result.serverInfo.name == "BountyVerdict" and .result.serverInfo.version == $version' <<<"$response" >/dev/null

      - name: Check whether this immutable version already exists
        id: existing
        env:
          SERVER_NAME: ${{ steps.manifest.outputs.name }}
          SERVER_VERSION: ${{ steps.manifest.outputs.version }}
        run: |
          encoded_name=$(jq -rn --arg value "$SERVER_NAME" '$value|@uri')
          response=$(curl --fail --silent --show-error "https://registry.modelcontextprotocol.io/v0.1/servers?search=$encoded_name")
          if jq -e --arg name "$SERVER_NAME" --arg version "$SERVER_VERSION" '.servers[]? | select(.server.name == $name and .server.version == $version)' <<<"$response" >/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install MCP Registry publisher
        if: steps.existing.outputs.published != 'true'
        run: |
          asset="mcp-publisher_linux_amd64.tar.gz"
          curl --fail --location --silent --show-error \
            "https://github.com/modelcontextprotocol/registry/releases/download/v1.8.0/$asset" \
            --output "$asset"
          echo "1370446bbe74d562608e8005a6ccce02d146a661fbd78674e11cc70b9618d6cf  $asset" | sha256sum --check --strict
          tar xzf "$asset" mcp-publisher
          ./mcp-publisher --version

      - name: Publish through GitHub OIDC
        if: steps.existing.outputs.published != 'true'
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

      - name: Verify registry listing
        env:
          SERVER_NAME: ${{ steps.manifest.outputs.name }}
          SERVER_VERSION: ${{ steps.manifest.outputs.version }}
          SERVER_REMOTE: ${{ steps.manifest.outputs.remote }}
        run: |
          encoded_name=$(jq -rn --arg value "$SERVER_NAME" '$value|@uri')
          for attempt in $(seq 1 12); do
            response=$(curl --fail --silent --show-error "https://registry.modelcontextprotocol.io/v0.1/servers?search=$encoded_name")
            if jq -e --arg name "$SERVER_NAME" --arg version "$SERVER_VERSION" --arg remote "$SERVER_REMOTE" '.servers[]? | select(.server.name == $name and .server.version == $version and .server.remotes[0].type == "streamable-http" and .server.remotes[0].url == $remote)' <<<"$response" >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          exit 1
