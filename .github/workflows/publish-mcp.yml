name: Publish remote MCP server

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: bountyverdict-mcp-registry
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Verify live MCP endpoint
        run: |
          response=$(curl --fail --silent --show-error \
            --user-agent "bountyverdict-owner-audit/1.0" \
            --header "Accept: application/json, text/event-stream" \
            --header "Content-Type: application/json" \
            --header "MCP-Protocol-Version: 2025-11-25" \
            --data '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{},"clientInfo":{"name":"registry-release-check","version":"1.0.0"}}}' \
            "https://bountyverdict-agent-production.mimirslab.workers.dev/mcp")
          jq -e '.result.protocolVersion == "2025-11-25" and .result.serverInfo.name == "BountyVerdict"' <<<"$response" >/dev/null

      - name: Check whether this immutable version already exists
        id: existing
        run: |
          response=$(curl --fail --silent --show-error 'https://registry.modelcontextprotocol.io/v0.1/servers?search=io.github.cristianmoroaica%2Fbountyverdict')
          if jq -e '.servers[]? | select(.server.name == "io.github.cristianmoroaica/bountyverdict" and .server.version == "1.0.0")' <<<"$response" >/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install MCP Registry publisher
        if: steps.existing.outputs.published != 'true'
        run: |
          curl --fail --location --silent --show-error \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher

      - name: Publish through GitHub OIDC
        if: steps.existing.outputs.published != 'true'
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

      - name: Verify registry listing
        run: |
          for attempt in $(seq 1 12); do
            response=$(curl --fail --silent --show-error 'https://registry.modelcontextprotocol.io/v0.1/servers?search=io.github.cristianmoroaica%2Fbountyverdict')
            if jq -e '.servers[]? | select(.server.name == "io.github.cristianmoroaica/bountyverdict" and .server.version == "1.0.0" and .server.remotes[0].type == "streamable-http" and .server.remotes[0].url == "https://bountyverdict-agent-production.mimirslab.workers.dev/mcp")' <<<"$response" >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          exit 1
