name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22.23.1
          cache: npm
          cache-dependency-path: agent/package-lock.json

      - name: Test shared analysis
        run: npm test

      - name: Install agent API dependencies
        working-directory: agent
        run: npm ci

      - name: Verify public and Worker agent contracts match
        run: npm run verify:llms

      - name: Test agent API and discovery contracts
        working-directory: agent
        run: npm test

      - name: Typecheck
        working-directory: agent
        run: npm run typecheck

      - name: Build Worker bundle
        working-directory: agent
        run: npm run deploy:dry

      - name: Build and smoke-test Glama stdio release
        working-directory: agent
        run: npm run glama:verify

      - name: Audit production and development dependencies
        working-directory: agent
        run: npm audit --audit-level=low
